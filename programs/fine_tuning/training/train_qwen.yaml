### train_qwen.yaml — SFT 训练配置模板
###
### 占位符说明（由 run_training.py 在运行时替换）：
###   {MODEL_NAME}        基础模型名或本地路径
###   {DATASET_KEY}       LLaMA-Factory dataset_info.json 中注册的数据集 key
###   {OUTPUT_DIR}        LoRA adapter 输出目录

model_name_or_path: {MODEL_NAME}
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
dataset: {DATASET_KEY}
output_dir: {OUTPUT_DIR}
overwrite_output_dir: true

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 8
logging_steps: 5
save_steps: 100
plot_loss: true
fp16: true
quantization_bit: 4
gradient_checkpointing: true
cutoff_len: 2048
