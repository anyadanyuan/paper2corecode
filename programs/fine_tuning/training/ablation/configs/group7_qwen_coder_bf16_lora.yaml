# ============================================================
# 消融实验配置
# 组名:  group7_qwen_coder_bf16_lora
# 描述:  BF16 + LoRA（不量化）
# 实验组: quantization
# ============================================================

model_name_or_path: Qwen/Qwen2.5-Coder-7B-Instruct
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 8
lora_alpha: 16

dataset: mini_paper_code
template: default
output_dir: /root/autodl-tmp/ablation_outputs/group7_qwen_coder_bf16_lora
overwrite_output_dir: true

# ── 快速训练参数（消融实验用，样本10条，2 epochs）──────────────
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 2
logging_steps: 1
save_steps: 500
bf16: true
gradient_checkpointing: true
cutoff_len: 2048
